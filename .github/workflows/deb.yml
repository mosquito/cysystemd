name: deb

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: jammy
            container: ubuntu:22.04
          - codename: noble
            container: ubuntu:24.04
          - codename: bookworm
            container: debian:12
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    permissions:
      contents: write
    steps:
      - name: Install git
        run: apt-get update -q && apt-get install -y git python3 python3-pip
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            dpkg-dev debhelper fakeroot dh-python \
            python3-all-dev python3-setuptools \
            libsystemd-dev
          pip3 install --break-system-packages Cython || pip3 install Cython
      - name: Set version from tag
        run: python3 scripts/bump_version.py ${{ github.ref_name }}
      - name: Build deb package
        run: dpkg-buildpackage -us -uc -b
      - name: Collect deb package
        run: |
          mkdir -p dist
          for f in ../*.deb; do
            fname=$(basename "$f" .deb)
            cp "$f" "dist/${fname}~${{ matrix.codename }}.deb"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.codename }}
          path: dist/*.deb
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
