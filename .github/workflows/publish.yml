name: publish

on:
  release:
    types: [published]

jobs:
  sdist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set version from tag
        run: python scripts/bump_version.py ${{ github.ref_name }}
      - run: pip install Cython setuptools
      - run: python setup.py sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz

  wheels-x86_64:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_34_x86_64
    permissions:
      contents: write
    strategy:
      matrix:
        python: [cp38-cp38, cp39-cp39, cp310-cp310, cp311-cp311, cp312-cp312, cp313-cp313, cp314-cp314]
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: yum install -y systemd-devel
      - name: Set version from tag
        run: python3 scripts/bump_version.py ${{ github.ref_name }}
      - name: Build wheel
        run: |
          /opt/python/${{ matrix.python }}/bin/pip install -U Cython setuptools wheel
          /opt/python/${{ matrix.python }}/bin/pip wheel . --no-build-isolation --no-deps -w /tmp/raw/
          auditwheel repair /tmp/raw/cysystemd-*.whl -w dist/ && rm /tmp/raw/cysystemd-*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-x86_64-${{ matrix.python }}
          path: dist/*.whl
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  wheels-aarch64:
    runs-on: ubuntu-24.04-arm
    container: quay.io/pypa/manylinux_2_34_aarch64
    permissions:
      contents: write
    strategy:
      matrix:
        python: [cp38-cp38, cp39-cp39, cp310-cp310, cp311-cp311, cp312-cp312, cp313-cp313, cp314-cp314]
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: yum install -y systemd-devel
      - name: Set version from tag
        run: python3 scripts/bump_version.py ${{ github.ref_name }}
      - name: Build wheel
        run: |
          /opt/python/${{ matrix.python }}/bin/pip install -U Cython setuptools wheel
          /opt/python/${{ matrix.python }}/bin/pip wheel . --no-build-isolation --no-deps -w /tmp/raw/
          auditwheel repair /tmp/raw/cysystemd-*.whl -w dist/ && rm /tmp/raw/cysystemd-*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-aarch64-${{ matrix.python }}
          path: dist/*.whl
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  pypi:
    needs: [sdist, wheels-x86_64, wheels-aarch64]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheel-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
