name: publish

on:
  release:
    types: [published]

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set version from tag
        run: python scripts/bump_version.py ${{ github.ref_name }}
      - run: pip install Cython setuptools
      - run: python setup.py sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels-x86_64:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_34_x86_64
    strategy:
      matrix:
        python: [cp38-cp38, cp39-cp39, cp310-cp310, cp311-cp311, cp312-cp312, cp313-cp313, cp314-cp314]
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: yum install -y systemd-devel
      - name: Set version from tag
        run: python3 scripts/bump_version.py ${{ github.ref_name }}
      - name: Build wheel
        run: |
          /opt/python/${{ matrix.python }}/bin/pip install -U Cython setuptools wheel
          /opt/python/${{ matrix.python }}/bin/pip wheel . --no-build-isolation --no-deps -w /tmp/raw/
          auditwheel repair /tmp/raw/cysystemd-*.whl -w dist/ && rm /tmp/raw/cysystemd-*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-x86_64-${{ matrix.python }}
          path: dist/*.whl

  wheels-aarch64:
    runs-on: ubuntu-24.04-arm
    container: quay.io/pypa/manylinux_2_34_aarch64
    strategy:
      matrix:
        python: [cp38-cp38, cp39-cp39, cp310-cp310, cp311-cp311, cp312-cp312, cp313-cp313, cp314-cp314]
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: yum install -y systemd-devel
      - name: Set version from tag
        run: python3 scripts/bump_version.py ${{ github.ref_name }}
      - name: Build wheel
        run: |
          /opt/python/${{ matrix.python }}/bin/pip install -U Cython setuptools wheel
          /opt/python/${{ matrix.python }}/bin/pip wheel . --no-build-isolation --no-deps -w /tmp/raw/
          auditwheel repair /tmp/raw/cysystemd-*.whl -w dist/ && rm /tmp/raw/cysystemd-*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-aarch64-${{ matrix.python }}
          path: dist/*.whl

  deb:
    strategy:
      matrix:
        include:
          - codename: jammy
            container: ubuntu:22.04
          - codename: noble
            container: ubuntu:24.04
          - codename: bookworm
            container: debian:12
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    steps:
      - name: Install git
        run: apt-get update -q && apt-get install -y git python3
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            dpkg-dev debhelper fakeroot dh-python \
            python3-all-dev python3-setuptools \
            libsystemd-dev cython3
      - name: Set version from tag
        run: python3 scripts/bump_version.py ${{ github.ref_name }}
      - name: Build deb package
        run: dpkg-buildpackage -us -uc -b
      - name: Collect deb package
        run: |
          mkdir -p dist
          for f in ../*.deb; do
            fname=$(basename "$f" .deb)
            cp "$f" "dist/${fname}~${{ matrix.codename }}.deb"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.codename }}
          path: dist/*.deb

  release:
    needs: [sdist, wheels-x86_64, wheels-aarch64, deb]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheel-*'
          path: dist/pypi
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/pypi
      - uses: actions/download-artifact@v4
        with:
          pattern: 'deb-*'
          path: dist/debs
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pypi/*.whl
            dist/pypi/*.tar.gz
            dist/debs/*.deb
